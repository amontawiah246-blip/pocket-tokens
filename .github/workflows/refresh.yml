name: Refresh SSID

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install playwright
      
      - run: npx playwright install chromium
      
      - name: Get Tokens
        env:
          PO_EMAIL: ${{ secrets.PO_EMAIL }}
          PO_PASSWORD: ${{ secrets.PO_PASSWORD }}
        run: |
          cat > refresh.js << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            let sessionId = null, userSecret = null, userId = null;
            
            page.on('websocket', ws => {
              ws.on('framesent', payload => {
                const msg = payload.toString();
                if (msg.includes('session_id')) {
                  const m = msg.match(/s:32:"([^"]+)"/);
                  if (m) sessionId = m[1];
                }
                if (msg.includes('"secret"')) {
                  const m = msg.match(/"secret":"([^"]+)"/);
                  if (m) userSecret = m[1];
                }
                if (msg.includes('"uid"')) {
                  const m = msg.match(/"uid":"(\d+)"/);
                  if (m) userId = m[1];
                }
              });
            });
            
            await page.goto('https://pocketoption.com/en/login');
            await page.fill('input[type="email"]', process.env.PO_EMAIL);
            await page.fill('input[type="password"]', process.env.PO_PASSWORD);
            await page.click('button[type="submit"]');
            await page.waitForURL('**/cabinet/**', { timeout: 60000 });
            await page.waitForTimeout(10000);
            
            fs.writeFileSync('tokens.json', JSON.stringify({
              session_id: sessionId,
              user_secret: userSecret,
              user_id: userId,
              updated: new Date().toISOString()
            }));
            console.log('Done!');
            await browser.close();
          })();
          EOF
          node refresh.js
      
      - name: Commit tokens
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tokens.json
          git commit -m "Update tokens" || true
          git push
